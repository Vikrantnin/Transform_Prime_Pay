<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Optimus Prime — UPI Payment</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --prime-blue: #1565C0;
      --prime-red: #C62828;
      --prime-silver: #90A4AE;
      --prime-gold: #F9A825;
      --energy: #00E5FF;
      --color-text-primary: #1a1a2e;
      --color-text-secondary: #555;
      --color-background-primary: #f4f6fa;
      --color-background-secondary: #fff;
      --color-border-tertiary: #dde3ef;
      --color-border-secondary: #c5cfe0;
      --border-radius-lg: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4ff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 520px;
      width: 100%;
      color: var(--color-text-primary);
    }
    /* ── Title ── */
    .title-bar { text-align: center; margin-bottom: 1.5rem; }
    .title-bar h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--prime-blue);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .title-bar p { font-size: 0.95rem; color: var(--color-text-secondary); margin-top: 4px; }

    /* ── Arena ── */
    .arena {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(21,101,192,0.08);
    }
    .arena::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--prime-red), var(--prime-blue), var(--prime-gold));
    }
    .robot-stage {
      width: 220px; height: 260px;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .robot-stage:hover { transform: scale(1.03); }

    .transform-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.6rem 1.8rem;
      border: 2px solid var(--prime-blue);
      border-radius: 8px;
      background: transparent;
      color: var(--prime-blue);
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .transform-btn:hover { background: var(--prime-blue); color: #fff; }
    .transform-btn.active { background: var(--prime-red); border-color: var(--prime-red); color: #fff; }

    .status-bar {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--prime-gold);
      text-align: center;
      min-height: 1.2rem;
    }
    .energy-bar {
      width: 100%; max-width: 280px;
      height: 8px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 4px;
      overflow: hidden;
    }
    .energy-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--energy);
      width: 100%;
      transition: width 0.8s ease;
      box-shadow: 0 0 6px var(--energy);
    }

    /* ── Payment ── */
    .payment-section {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.4rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 20px rgba(21,101,192,0.08);
    }
    .payment-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: 1px;
      text-align: center;
    }
    .amount-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .amount-btn {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 6px;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .amount-btn:hover, .amount-btn.selected {
      border-color: var(--prime-blue);
      color: var(--prime-blue);
      background: #e8f0fe;
    }
    .qr-wrapper {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      display: inline-block;
      box-shadow: 0 2px 12px rgba(21,101,192,0.10);
    }
    .qr-amount-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      color: var(--prime-blue);
      letter-spacing: 1.5px;
      text-align: center;
      margin-top: 6px;
    }
    .upi-id { font-size: 0.9rem; color: var(--color-text-secondary); text-align: center; }
    .upi-id strong { color: var(--color-text-primary); font-weight: 600; }

    .pay-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.65rem 2rem;
      border-radius: 8px;
      border: none;
      background: #2E7D32;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pay-btn:hover { background: #1B5E20; }

    .footer-note {
      font-size: 0.78rem;
      color: var(--color-text-secondary);
      text-align: center;
      max-width: 300px;
    }

    /* ── Sparks ── */
    .sparks { pointer-events: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
    .spark {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      animation: sparkAnim 0.6s ease-out forwards;
      opacity: 0;
    }

    /* ── Animations ── */
    @keyframes sparkAnim {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-6px) rotate(-2deg); }
      75%     { transform: translateX(6px)  rotate(2deg); }
    }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 4px  var(--energy)); }
      50%     { filter: drop-shadow(0 0 12px var(--energy)); }
    }
    .transforming { animation: shake 0.4s ease, glow 0.4s ease; }
  </style>
</head>
<body>

<div class="container">

  <!-- Title -->
  <div class="title-bar">
    <h1>⚡ Optimus Prime</h1>
    <p>Tap to transform — Autobots, roll out!</p>
  </div>

  <!-- Robot Arena -->
  <div class="arena" id="arena">
    <div class="sparks" id="sparks"></div>

    <div class="energy-bar">
      <div class="energy-fill" id="energyFill"></div>
    </div>
    <div class="status-bar" id="statusBar">ROBOT MODE — AUTOBOT LEADER</div>

    <div class="robot-stage" id="robotStage" onclick="handleTransform()">
      <svg width="220" height="260" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg">

        <!-- ═══ ROBOT MODE ═══ -->
        <g id="robotMode">
          <!-- Legs -->
          <rect x="68" y="195" width="28" height="48" rx="5" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
          <rect x="124" y="195" width="28" height="48" rx="5" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
          <rect x="70"  y="232" width="26" height="12" rx="3" fill="#C62828"/>
          <rect x="126" y="232" width="26" height="12" rx="3" fill="#C62828"/>
          <!-- Body -->
          <rect x="62" y="130" width="96" height="68" rx="8" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
          <rect x="72" y="140" width="76" height="42" rx="5" fill="#1976D2"/>
          <!-- Autobot emblem -->
          <polygon points="110,145 118,155 113,155 113,165 107,165 107,155 102,155" fill="#C62828"/>
          <!-- Chest windows -->
          <rect x="78"  y="145" width="18" height="16" rx="3" fill="#00E5FF" opacity="0.8"/>
          <rect x="124" y="145" width="18" height="16" rx="3" fill="#00E5FF" opacity="0.8"/>
          <!-- Arms -->
          <rect x="26"  y="132" width="34" height="56" rx="7" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
          <rect x="160" y="132" width="34" height="56" rx="7" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
          <rect x="26"  y="175" width="34" height="14" rx="4" fill="#C62828"/>
          <rect x="160" y="175" width="34" height="14" rx="4" fill="#C62828"/>
          <!-- Cannon -->
          <circle cx="200" cy="160" r="8" fill="#37474F" stroke="#90A4AE" stroke-width="1"/>
          <circle cx="200" cy="160" r="4" fill="#F9A825"/>
          <!-- Neck -->
          <rect x="100" y="116" width="20" height="16" rx="3" fill="#1565C0"/>
          <!-- Head -->
          <rect x="78" y="68" width="64" height="52" rx="10" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
          <rect x="86" y="80" width="48" height="28" rx="6"  fill="#1976D2"/>
          <!-- Eyes -->
          <rect x="90"  y="84" width="14" height="10" rx="3" fill="#00E5FF"/>
          <rect x="116" y="84" width="14" height="10" rx="3" fill="#00E5FF"/>
          <circle cx="97"  cy="89" r="3" fill="#fff" opacity="0.9"/>
          <circle cx="123" cy="89" r="3" fill="#fff" opacity="0.9"/>
          <!-- Mouth plate -->
          <rect x="90" y="98" width="40" height="8" rx="3"  fill="#90A4AE"/>
          <rect x="94"  y="100" width="8" height="4" rx="1" fill="#607D8B"/>
          <rect x="106" y="100" width="8" height="4" rx="1" fill="#607D8B"/>
          <rect x="118" y="100" width="8" height="4" rx="1" fill="#607D8B"/>
          <!-- Crest -->
          <polygon points="110,64 116,72 104,72" fill="#F9A825"/>
          <rect x="106" y="58" width="8" height="10" rx="2" fill="#F9A825"/>
          <!-- Shoulder pads -->
          <rect x="56"  y="122" width="28" height="14" rx="5" fill="#C62828"/>
          <rect x="136" y="122" width="28" height="14" rx="5" fill="#C62828"/>
        </g>

        <!-- ═══ TRUCK MODE ═══ -->
        <g id="truckMode" style="display:none">
          <!-- Cab -->
          <rect x="30" y="80" width="90" height="70" rx="8" fill="#C62828" stroke="#B71C1C" stroke-width="2"/>
          <rect x="32" y="82" width="86" height="36" rx="6" fill="#D32F2F"/>
          <!-- Windshield -->
          <rect x="40" y="86" width="70" height="28" rx="4" fill="#00E5FF" opacity="0.7"/>
          <line x1="75" y1="86" x2="75" y2="114" stroke="#0D47A1" stroke-width="2"/>
          <line x1="80" y1="118" x2="80" y2="150" stroke="#B71C1C" stroke-width="1.5"/>
          <!-- Headlights -->
          <rect x="32" y="122" width="18" height="10" rx="3" fill="#F9A825"/>
          <!-- Trailer -->
          <rect x="118" y="100" width="80" height="50" rx="5" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
          <rect x="124" y="106" width="62" height="8" rx="2" fill="#1976D2"/>
          <rect x="124" y="120" width="62" height="8" rx="2" fill="#1976D2"/>
          <rect x="124" y="134" width="62" height="8" rx="2" fill="#1976D2"/>
          <polygon points="170,108 175,115 172,115 172,122 168,122 168,115 165,115" fill="#F9A825"/>
          <!-- Wheels -->
          <circle cx="55"  cy="158" r="20" fill="#263238" stroke="#37474F" stroke-width="2"/>
          <circle cx="55"  cy="158" r="10" fill="#455A64"/>
          <circle cx="55"  cy="158" r="4"  fill="#F9A825"/>
          <circle cx="100" cy="158" r="20" fill="#263238" stroke="#37474F" stroke-width="2"/>
          <circle cx="100" cy="158" r="10" fill="#455A64"/>
          <circle cx="100" cy="158" r="4"  fill="#F9A825"/>
          <circle cx="152" cy="158" r="18" fill="#263238" stroke="#37474F" stroke-width="2"/>
          <circle cx="152" cy="158" r="9"  fill="#455A64"/>
          <circle cx="152" cy="158" r="3.5" fill="#F9A825"/>
          <circle cx="188" cy="158" r="18" fill="#263238" stroke="#37474F" stroke-width="2"/>
          <circle cx="188" cy="158" r="9"  fill="#455A64"/>
          <circle cx="188" cy="158" r="3.5" fill="#F9A825"/>
          <!-- Exhaust pipes -->
          <rect x="116" y="78" width="6" height="26" rx="3" fill="#455A64"/>
          <rect x="126" y="78" width="6" height="26" rx="3" fill="#455A64"/>
          <!-- Ground shadow -->
          <ellipse cx="120" cy="188" rx="90" ry="8" fill="#000" opacity="0.12"/>
        </g>

      </svg>
    </div>

    <button class="transform-btn" id="transformBtn" onclick="handleTransform()">
      🔄 TRANSFORM
    </button>
  </div>

  <!-- UPI Payment -->
  <div class="payment-section">
    <div class="payment-title">🛡️ Unlock Autobot Powers — Pay via UPI</div>

    <!-- Amount selector -->
    <div class="amount-row">
      <button class="amount-btn selected" onclick="selectAmount(this, 10)">₹10</button>
      <button class="amount-btn"          onclick="selectAmount(this, 29)">₹29</button>
      <button class="amount-btn"          onclick="selectAmount(this, 49)">₹49</button>
      <button class="amount-btn"          onclick="selectAmount(this, 99)">₹99</button>
    </div>

    <!-- QR code (generated dynamically) -->
    <div>
      <div class="qr-wrapper">
        <canvas id="qrCanvas" width="160" height="160"></canvas>
      </div>
      <div class="qr-amount-label" id="qrAmountLabel">₹10 · 92vikrantninave@ybl</div>
    </div>

    <div class="upi-id">
      Scan with any UPI app &nbsp;|&nbsp; <strong>92vikrantninave@ybl</strong>
    </div>

    <button class="pay-btn" onclick="openUpi()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      Open UPI App
    </button>

    <p class="footer-note">
      Powered by Bharat Pay · Supports PhonePe, BHIM, GPay, Paytm &amp; all UPI apps
    </p>
  </div>

</div>

<!-- QR Code library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  /* ─── Config ─────────────────────────────────── */
  const UPI_ID       = '92vikrantninave@ybl';
  const MERCHANT     = 'Vikrant+Ninave';

  /* ─── State ──────────────────────────────────── */
  let isRobot        = true;
  let isTransforming = false;
  let selectedAmount = 10;

  /* ─── UPI helpers ────────────────────────────── */
  function buildUpiUrl(amount) {
    return `upi://pay?pa=${UPI_ID}&pn=${MERCHANT}&am=${amount}&cu=INR&tn=Autobot+Powers`;
  }

  function renderQR(amount) {
    QRCode.toCanvas(document.getElementById('qrCanvas'), buildUpiUrl(amount), {
      width: 160, margin: 1,
      color: { dark: '#000000', light: '#ffffff' }
    });
    document.getElementById('qrAmountLabel').textContent = `₹${amount} · ${UPI_ID}`;
  }

  function selectAmount(btn, amount) {
    selectedAmount = amount;
    document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    renderQR(amount);
  }

  function openUpi() {
    window.location.href = buildUpiUrl(selectedAmount);
  }

  /* ─── Spark effect ───────────────────────────── */
  function spawnSparks() {
    const sparks = document.getElementById('sparks');
    sparks.innerHTML = '';
    for (let i = 0; i < 18; i++) {
      const s  = document.createElement('div');
      s.className = 'spark';
      const x  = 40 + Math.random() * 140;
      const y  = 60 + Math.random() * 160;
      const tx = (Math.random() - 0.5) * 60;
      const ty = (Math.random() - 0.5) * 60;
      const bg = Math.random() > 0.5 ? '#00E5FF' : '#F9A825';
      s.style.cssText =
        `left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px;` +
        `animation-delay:${(Math.random() * 0.3).toFixed(2)}s;background:${bg}`;
      sparks.appendChild(s);
    }
    setTimeout(() => sparks.innerHTML = '', 900);
  }

  /* ─── Transform logic ────────────────────────── */
  function handleTransform() {
    if (isTransforming) return;
    isTransforming = true;

    const stage  = document.getElementById('robotStage');
    const btn    = document.getElementById('transformBtn');
    const status = document.getElementById('statusBar');
    const fill   = document.getElementById('energyFill');

    spawnSparks();
    stage.classList.add('transforming');
    fill.style.width    = '0%';
    status.textContent  = 'TRANSFORMING…';
    btn.classList.add('active');
    btn.textContent     = '⚡ TRANSFORMING…';

    setTimeout(() => {
      isRobot = !isRobot;
      document.getElementById('robotMode').style.display = isRobot ? '' : 'none';
      document.getElementById('truckMode').style.display = isRobot ? 'none' : '';
      stage.classList.remove('transforming');
      fill.style.width   = '100%';
      status.textContent = isRobot ? 'ROBOT MODE — AUTOBOT LEADER' : 'TRUCK MODE — ROLL OUT!';
      btn.classList.remove('active');
      btn.textContent    = isRobot ? '🔄 TRANSFORM' : '🤖 TRANSFORM BACK';
      isTransforming     = false;
    }, 700);
  }

  /* ─── Init ───────────────────────────────────── */
  window.addEventListener('load', () => renderQR(selectedAmount));
</script>
</body>
</html>
